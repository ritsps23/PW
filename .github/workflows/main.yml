name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '25'   # força Node 25 no Actions

      - name: Install dependencies
        run: npm install

      - name: Run Prettier
        run: npx prettier . --write

      - name: Print name
        run: echo "Pipeline executada por Rita Costa"
